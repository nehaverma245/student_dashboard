<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | EduPortal</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="script.js"></script>
</head>
<body class="auth-page">
  <div class="auth-shell fade-in">
    <div class="auth-card">
      <h1>Register</h1>
      <p>Create an account to secure access.</p>
      <form id="registerForm">
        <label>Full Name</label>
        <input type="text" id="registerName" required placeholder="Sakshi Rajpoot" />
        <label>Email</label>
        <input type="email" id="registerEmail" required placeholder="name@example.com" />
        <label>Password</label>
        <input type="password" id="registerPassword" required placeholder="••••••••" />
        <p class="form-error" id="registerError"></p>
        <button type="submit">Register</button>
      </form>
      <p class="auth-foot">Already registered? <a href="login.html">Login</a></p>
    </div>
  </div>
</body>
</html>
